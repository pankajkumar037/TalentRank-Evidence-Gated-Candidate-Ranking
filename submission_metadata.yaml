# AI tools declaration (transparency only — honest declaration is not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude (Claude Code) as a pair-programmer for data profiling, code review,
  and iterating on the ranker architecture and performance. All design decisions,
  thresholds, and the evidence-gate methodology are the team's own engineering,
  justified against the job description and measured on the dataset. No candidate
  data was sent to any hosted LLM during ranking (ranking is offline, pure rules).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Evidence-gated ranker. final = gate × quality × availability. We ignore skill tags
  and headlines (measured to be randomly-generated noise) and score only the prose in
  each candidate's job descriptions for proof of the JD's four must-haves (shipped
  ranking/recommendation, production embeddings/retrieval, vector-DB/hybrid search,
  rigorous NDCG/A-B evaluation), graded by strength and recency-weighted. A non-saturating
  DEPTH score (scale, full-stack breadth, end-to-end ownership, named-technique specificity)
  orders the many candidates who all prove the four must-haves — the main NDCG@10 lever.
  Hard gates encode the JD's stated disqualifiers over the whole career; fit adds a soft
  experience curve, Noida/Pune location tier and seniority alignment; a fit-first behavioral
  multiplier [0.75,1.0] demotes ghosts without ever sinking a stronger fit. Honeypots are
  caught by impossibility rules and removed. We built and A/B-tested an offline embedding
  booster but EXCLUDED it after measuring it rewards buzzword profiles and demotes
  plain-language fits — the exact bias the challenge punishes. Every weight cites a JD
  sentence (not tuned to any self-made labels); explanations use only facts the scorer used,
  so nothing is hallucinated. Ranking runs pure-rules, CPU-only, no network, deterministic,
  ~60 s on 100k. A silver-label harness (evaluate.py) is used only for regression detection.

